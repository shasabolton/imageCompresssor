name: Compress Images to WebP

on:
  push:
    branches:
      - main
    paths:
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.png'
      - '**/*.webp'
  workflow_dispatch:
  workflow_call:
    inputs:
      source_repo_pat:
        required: false
        type: string
      target_repo_pat:
        required: false
        type: string

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      SOURCE_REPO: shasabolton/images
      TARGET_REPO: shasabolton/compressedImages
      TARGET_REPO_PATH: compressed
      TARGET_BRANCH: main

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ inputs.source_repo_pat || secrets.SOURCE_REPO_PAT || github.token }}
          path: source
          fetch-depth: 0
          lfs: true

      - name: Pull Git LFS objects for source
        env:
          GH_TOKEN: ${{ inputs.source_repo_pat || secrets.SOURCE_REPO_PAT || github.token }}
        run: |
          # Create a credential helper script for Git LFS
          mkdir -p /tmp/git-helpers
          cat > /tmp/git-helpers/credential-helper.sh << 'EOF'
          #!/bin/bash
          if [[ "$1" == "get" ]]; then
            echo "username=x-access-token"
            echo "password=$GH_TOKEN"
          fi
          EOF
          chmod +x /tmp/git-helpers/credential-helper.sh
          
          # Configure Git and Git LFS to use the credential helper
          git config --global credential.helper '!sh /tmp/git-helpers/credential-helper.sh'
          
          # Initialize and configure Git LFS for the source repo
          git -C source lfs install --local --force
          git -C source config --local credential.helper '!sh /tmp/git-helpers/credential-helper.sh'
          
          # Fetch and pull ALL LFS objects
          echo "Fetching all LFS objects..."
          git -C source lfs fetch --all
          
          echo "Pulling LFS objects into working directory..."
          git -C source lfs pull
          
          echo "Listing downloaded LFS files..."
          git -C source lfs ls-files | head -30

      - name: Verify LFS objects were downloaded
        run: |
          echo "=== Checking file sizes ==="
          find source -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) | while read file; do
            size=$(stat -c%s "$file" 2>/dev/null || echo 0)
            if [ "$size" -lt 1000 ]; then
              echo "ERROR: File is suspiciously small ($size bytes): $file"
              if head -c 100 "$file" | grep -q "version https://git-lfs.github.com/spec/v1"; then
                echo "  ^ Still a pointer file, not downloaded!"
              fi
              exit 1
            fi
            echo "✓ OK ($size bytes): $(basename "$file")"
          done
          
          echo ""
          echo "All image files verified as complete blobs."

      - name: Checkout workflow repository
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 0

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ inputs.target_repo_pat || secrets.TARGET_REPO_PAT || github.token }}
          path: ${{ env.TARGET_REPO_PATH }}
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: repo
        run: npm install

      - name: Determine changed image files
        id: diff
        run: |
          git -C source fetch --prune --unshallow || true
          echo "changed-files<<EOF" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git -C source ls-files '*.jpg' '*.jpeg' '*.png' '*.webp' | sed '/^$/d' >> $GITHUB_OUTPUT
          else
            git -C source diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- '*.jpg' '*.jpeg' '*.png' '*.webp' | sed '/^$/d' >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Show source image discovery
        run: |
          echo "Source image count:"
          git -C source ls-files '*.jpg' '*.jpeg' '*.png' '*.webp' | wc -l
          echo "Source image sample:"
          git -C source ls-files '*.jpg' '*.jpeg' '*.png' '*.webp' | head -20 || true

      - name: Check LFS file tracking and dump image diagnostics
        run: |
          echo "=== Git LFS Configuration ==="
          git -C source lfs version || true
          echo ""
          echo "=== LFS Tracked Files (ls-files) ==="
          git -C source lfs ls-files | head -20 || echo "No LFS files found"
          echo ""
          echo "=== LFS Environment ==="
          git -C source lfs env || true
          echo ""
          echo "=== Image Diagnostics (size, sha256, header) ==="
          find source -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) | while read -r file; do
            echo "--- $file ---"
            stat -c "%s bytes" "$file" || true
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$file" | awk '{print $1}' || true
            fi
            echo "Header (first 128 bytes):"
            head -c 128 "$file" | od -A x -t x1z -v || true
            echo ""
          done

      - name: Generate WebP variants
        run: |
          echo "${{ steps.diff.outputs.changed-files }}" > changed-files.txt
          node repo/scripts/generate-images.js \
            --source-root source \
            --output-root ${{ env.TARGET_REPO_PATH }} \
            --changed-files-file changed-files.txt

      - name: Commit and push generated images
        run: |
          cd ${{ env.TARGET_REPO_PATH }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No generated image changes to commit."
            exit 0
          fi
          git commit -m "Generate WebP image variants from source push"
          git push origin ${{ env.TARGET_BRANCH }}
